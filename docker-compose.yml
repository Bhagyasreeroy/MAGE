version: "3.9"

# ── MAGE Docker Compose — Development Stack ───────────────────────────────────
# Services:
#   backend   — FastAPI (port 8000)
#   frontend  — Next.js (port 3000)
#   postgres  — Postgres database (port 5432)
#
# Note: the vector store runs in-process via chromadb's embedded
# PersistentClient (see rag/vector_store.py), persisted to ./data/chroma_db.
# No separate ChromaDB server container is required.
#
# Usage:
#   cp .env.example .env
#   docker compose up --build

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mage-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VECTOR_STORE_BACKEND=${VECTOR_STORE_BACKEND:-chroma}
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - CHROMA_DB_PATH=/app/data/chroma_db
      - PROCESSING_ENGINE=${PROCESSING_ENGINE:-pandas}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mage}:${POSTGRES_PASSWORD:-mage}@postgres:5432/${POSTGRES_DB:-mage}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE-ME-IN-PRODUCTION-use-openssl-rand-hex-32}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use python, not curl — curl is only present in the Dockerfile's
      # builder stage, never in the slim runtime image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mage-network
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mage-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
      - NODE_ENV=development
    depends_on:
      - backend
    healthcheck:
      # Use node, not curl — curl is not installed in the alpine runner image.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mage-network
    restart: unless-stopped

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mage-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mage}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mage}
      - POSTGRES_DB=${POSTGRES_DB:-mage}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mage} -d ${POSTGRES_DB:-mage}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - mage-network
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  mage-network:
    driver: bridge
